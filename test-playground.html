<body class="bg-white text-ink min-h-screen">
    <main class="max-w-3xl mx-auto px-6 py-12">
        <h1 class="text-2xl font-bold mb-2">Test: Live Playground</h1>
        <p class="text-muted text-sm mb-8">Halaman uji untuk assets/playground.js — counter example dari plan.</p>

        <script type="text/plain" id="pg-test-1">function App() {
  const [count, setCount] = React.useState(0);
  return (
    <div>
      <h2>Counter: {count}</h2>
      <button onClick={() => setCount(count + 1)}>Tambah</button>
    </div>
  );
}</script>
        <div class="playground-mount mt-4 mb-4" data-code-id="pg-test-1"></div>

        <h2 class="text-xl font-bold mt-12 mb-2">Test: Quiz</h2>
        <p class="text-muted text-sm mb-4">Jawab dua soal di bawah — feedback instan + skor tersimpan di localStorage.</p>
        <script type="application/json" id="quiz-test-1">
[
  {"q": "JSX itu sebenarnya apa sih?", "options": ["HTML yang ditempel di dalam JS", "Sugar syntax untuk React.createElement", "Template engine kayak Handlebars", "Bahasa pemrograman baru"], "answer": 1, "explain": "JSX di-compile jadi panggilan <code>React.createElement()</code> — hasil akhirnya cuma object JavaScript biasa, bukan HTML."},
  {"q": "Kalau lo mau nyimpen nilai yang berubah dan bikin UI ikut update, hook apa yang dipakai?", "options": ["useEffect", "useRef", "useState", "useMemo"], "answer": 2, "explain": "<code>useState</code> ngasih lo nilai + setter. Panggil setter-nya → React re-render komponen dengan nilai baru."}
]
        </script>
        <div class="quiz-mount mt-4 mb-4" data-quiz-id="quiz-test-1"></div>

        <h2 class="text-xl font-bold mt-12 mb-2">Test: Challenge</h2>
        <p class="text-muted text-sm mb-4">Starter code sengaja belum lengkap — lengkapi sampai semua test lulus, terus klik ▶ Test.</p>

        <script type="text/plain" id="ch-test-1-test">expect('Ada elemen h2 dengan id "angka"', document.getElementById('angka') !== null);
